<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <title>Connexion - JobTracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container vh-100 d-flex align-items-center justify-content-center">
        <div class="card shadow border-0 p-4" style="width: 100%; max-width: 400px;">
            <div class="text-center mb-4">
                <h2 class="fw-bold text-primary">JobTracker</h2>
                <p class="text-muted">Ravi de vous revoir</p>
            </div>

            <form method="post">
                {% csrf_token %}
                {% if form.errors %}
                <div class="alert alert-danger py-2 small">Identifiants incorrects.</div>
                {% endif %}

                <div class="mb-3">
                    <label class="form-label small fw-bold text-uppercase text-muted">Nom d'utilisateur</label>
                    <input type="text" name="username" class="form-control" placeholder="Votre pseudo" required>
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-bold text-uppercase text-muted">Mot de passe</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2">Se connecter</button>
            </form>

            <div class="text-center mt-4">
                <p class="small text-muted mb-0">Pas encore de compte ?</p>
                <a href="{% url 'register' %}" class="small text-decoration-none fw-bold">Créez-en un ici</a>
            </div>
        </div>
    </div>
</body>

</html>
