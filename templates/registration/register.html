<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Inscription - JobTracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container vh-100 d-flex align-items-center justify-content-center py-5">
        <div class="card shadow border-0 p-4" style="width: 100%; max-width: 450px;">
            <div class="text-center mb-4">
                <h2 class="fw-bold text-success">Inscription</h2>
                <p class="text-muted">Commencez à suivre vos opportunités</p>
            </div>

            <form method="POST">
                {% csrf_token %}
                <div class="mb-3 small">
                    {{ form.as_p }}
                </div>

                <button type="submit" class="btn btn-success w-100 py-2">Créer mon compte</button>
            </form>

            <div class="text-center mt-4">
                <p class="small text-muted mb-0">Déjà inscrit ?</p>
                <a href="{% url 'login' %}" class="small text-decoration-none fw-bold">Connectez-vous ici</a>
            </div>
        </div>
    </div>
</body>

</html>
